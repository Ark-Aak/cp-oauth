services:
    db:
        image: postgres:16-alpine
        ports:
            - '5432:5432'
        environment:
            POSTGRES_USER: cpuser
            POSTGRES_PASSWORD: cppass
            POSTGRES_DB: cpoauth
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U cpuser -d cpoauth']
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        ports:
            - '6379:6379'
        volumes:
            - redisdata:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    pgdata:
    redisdata:
